name: Secure Flet Android Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. سحب الكود من المستودع
        uses: actions/checkout@v4

      - name: 2. إعداد لغة بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # إصدار مستقر جداً مع flet
          cache: 'pip'

      - name: 3. إعداد الجافا (مهم جداً للأندرويد)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 4. تثبيت محرك فلاتر (Flutter)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 5. تثبيت المكتبات (flet وغيرها)
        run: |
          python -m pip install --upgrade pip
          # تثبيت flet بشكل أساسي
          pip install flet
          # إذا كان هناك ملف requirements.txt سيقوم بتثبيت محتواه
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 6. التحقق من ملفات المشروع
        run: |
          # التأكد من وجود الملف الرئيسي لمنع فشل البناء لاحقاً
          if [ ! -f main.py ]; then echo "Error: main.py not found!"; exit 1; fi

      - name: 7. بناء ملف الـ APK
        run: |
          # أمر البناء مع تفاصيل إضافية لكشف الأخطاء
          flet build apk --verbose

      - name: 8. رفع التطبيق الجاهز للتحميل
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: My-Android-App
          path: build/apk/*.apk
